<!DOCTYPE html>
<html>

<div class="brand-bar">
    <div class="brand-logo" onclick="window.location.href='home.html'">
        ♞ Chessiax <span class="beta-badge">Beta</span>
    </div>
    <div class="brand-links">
        <button onclick="window.location.href='home.html'">Home</button>
        <button onclick="window.location.href='dashboard.html'">Dashboard</button>
        <button onclick="window.location.href='openings.html'">Library</button>
        <button onclick="window.location.href='index.html'">Analyze</button>
        <button onclick="window.location.href='tactics.html'">Tactics</button>
        <button onclick="window.location.href='review.html'">Review</button>
    </div>
</div>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <button class="back-btn" onclick="window.location.href='home.html'">🏠 Home</button>

        <section class="page-hero dashboard-hero">
            <div class="hero-badge">Coach Hub</div>
            <h1>Coach Dashboard</h1>
            <p>See your current Chessiax progress and pick the next useful training step.</p>
        </section>

        <section id="dashboardContent" class="dashboard-stack"></section>

        <footer class="app-footer">
            <div>
                <strong>Chessiax</strong>
                <p>AI-powered chess opening training for learning, practice and progress tracking.</p>
            </div>

            <div class="footer-links">
                <button onclick="window.location.href='home.html'">Home</button>
                <button onclick="window.location.href='dashboard.html'">Dashboard</button>
                <button onclick="window.location.href='openings.html'">Library</button>
                <button onclick="window.location.href='index.html'">Analyze</button>
                <button onclick="window.location.href='tactics.html'">Tactics</button>
                <button onclick="window.location.href='review.html'">Review</button>
            </div>
        </footer>

    </div>

    <script>
        const GAME_ANALYSIS_STORAGE_KEY = "chessiax_game_analysis";
        const STUDY_PLAN_PROGRESS_PREFIX = "chessiax_study_plan_progress_";
        const TACTICS_PROGRESS_STORAGE_KEY = "chessiax_tactics_progress";
        const SAVED_REVIEW_STORAGE_KEY = "chessiax_saved_game_review";

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function safeNumber(value, fallback = 0) {
            return Number.isFinite(Number(value)) ? Number(value) : fallback;
        }

        function safeReadJson(key, fallback = null) {
            try {
                const saved = localStorage.getItem(key);
                if (!saved) {
                    return fallback;
                }

                return JSON.parse(saved);
            } catch (error) {
                console.warn(`Could not read ${key}`, error);
                return fallback;
            }
        }

        function formatDate(value) {
            if (!value) {
                return "N/A";
            }

            const date = new Date(value);
            if (Number.isNaN(date.getTime())) {
                return "N/A";
            }

            return date.toLocaleDateString(undefined, {
                year: "numeric",
                month: "short",
                day: "numeric"
            });
        }

        function getStudyPlanProgressKey(username) {
            return `${STUDY_PLAN_PROGRESS_PREFIX}${String(username || "unknown").trim().toLowerCase()}`;
        }

        function getSavedGameAnalysis() {
            const saved = safeReadJson(GAME_ANALYSIS_STORAGE_KEY);
            return saved && saved.analysis ? saved : null;
        }

        function getStudyPlanProgress(savedAnalysis) {
            const candidates = [];

            if (savedAnalysis?.username) {
                candidates.push({
                    username: savedAnalysis.username,
                    key: getStudyPlanProgressKey(savedAnalysis.username)
                });
            }

            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith(STUDY_PLAN_PROGRESS_PREFIX)) {
                    candidates.push({
                        username: key.replace(STUDY_PLAN_PROGRESS_PREFIX, ""),
                        key
                    });
                }
            }

            for (const candidate of candidates) {
                const days = safeReadJson(candidate.key, []);
                const completedDays = Array.isArray(days)
                    ? [...new Set(days.filter(day => Number.isInteger(day) && day >= 1 && day <= 7))].sort((a, b) => a - b)
                    : [];

                if (completedDays.length > 0) {
                    return {
                        username: candidate.username,
                        completedDays,
                        completedCount: completedDays.length,
                        nextDay: [1, 2, 3, 4, 5, 6, 7].find(day => !completedDays.includes(day)) || null
                    };
                }
            }

            return null;
        }

        function getTacticsProgress() {
            const progress = safeReadJson(TACTICS_PROGRESS_STORAGE_KEY);
            if (!progress || !Array.isArray(progress.sessions) || progress.sessions.length === 0) {
                return null;
            }

            return {
                sessions: progress.sessions,
                lastSession: progress.lastSession || progress.sessions[progress.sessions.length - 1]
            };
        }

        function getSavedReview() {
            const saved = safeReadJson(SAVED_REVIEW_STORAGE_KEY);
            return saved && saved.data ? saved : null;
        }

        function getReviewHistory() {
            const history = safeReadJson("chessiax_review_history", []);
            return Array.isArray(history) ? history.filter(item => item && item.data) : [];
        }

        function getAllStudyDaysCompleted() {
            const completedDays = new Set();

            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (!key || !key.startsWith(STUDY_PLAN_PROGRESS_PREFIX)) {
                    continue;
                }

                const days = safeReadJson(key, []);
                if (!Array.isArray(days)) {
                    continue;
                }

                days.forEach(day => {
                    if (Number.isInteger(day) && day >= 1 && day <= 7) {
                        completedDays.add(`${key}:${day}`);
                    }
                });
            }

            return completedDays.size;
        }

        function getOpeningPracticeAttempts() {
            let attempts = 0;

            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (!key || !key.startsWith("practice_stats_")) {
                    continue;
                }

                const stats = safeReadJson(key, {});
                attempts += safeNumber(stats?.attempts);
            }

            return attempts;
        }

        function getActivityMessage(score) {
            if (score === 0) {
                return "Start your first training session.";
            }
            if (score <= 3) {
                return "Good start — keep building momentum.";
            }
            if (score <= 8) {
                return "Strong progress this week.";
            }
            return "Excellent consistency.";
        }

        function getTrainingProgress(tacticsProgress) {
            const studyDaysCompleted = getAllStudyDaysCompleted();
            const tacticsSessionsCompleted = tacticsProgress?.sessions?.length || 0;
            const gameReviewsSaved = getReviewHistory().length;
            const openingPracticeAttempts = getOpeningPracticeAttempts();
            const totalActivityScore = (
                studyDaysCompleted +
                tacticsSessionsCompleted +
                gameReviewsSaved +
                openingPracticeAttempts
            );

            return {
                studyDaysCompleted,
                tacticsSessionsCompleted,
                gameReviewsSaved,
                openingPracticeAttempts,
                totalActivityScore,
                message: getActivityMessage(totalActivityScore)
            };
        }

        function getRecommendedStudyItems(data) {
            return Array.isArray(data?.recommended_study) ? data.recommended_study : [];
        }

        function phaseNeedsWork(weaknessBreakdown, area) {
            if (!Array.isArray(weaknessBreakdown)) {
                return false;
            }

            return weaknessBreakdown.some(item =>
                String(item?.area || "").toLowerCase() === area
                && String(item?.status || "").toLowerCase() === "needs work"
            );
        }

        function createOpeningPlanDay(studyItem, task, purpose) {
            const focus = studyItem?.family || studyItem?.opening || "Opening Review";
            return {
                focus,
                category: "Opening",
                task,
                purpose,
                openingName: studyItem ? focus : ""
            };
        }

        function generateSevenDayPlan(data) {
            const recommendations = getRecommendedStudyItems(data);
            const phaseSummary = data && typeof data.phase_summary === "object" ? data.phase_summary : {};
            const weaknessBreakdown = Array.isArray(data?.weakness_breakdown) ? data.weakness_breakdown : [];
            const mostCommonLossPhase = String(phaseSummary?.most_common_loss_phase || "none").toLowerCase();
            const needsMiddlegame = phaseNeedsWork(weaknessBreakdown, "middlegame") || mostCommonLossPhase === "middlegame";
            const needsEndgame = phaseNeedsWork(weaknessBreakdown, "endgame") || mostCommonLossPhase === "endgame";
            const needsExtraOpening = mostCommonLossPhase === "opening";
            const plan = [];

            const openingTasks = [
                { task: "Learn the main ideas", purpose: "Understand the plans before memorizing moves." },
                { task: "Practice the opening line", purpose: "Build comfort with the first critical moves." },
                { task: "Review common mistakes", purpose: "Spot the patterns that usually cost you points." },
                { task: "Repeat from memory", purpose: "Strengthen recall without relying on notes." }
            ];

            if (recommendations.length > 0) {
                openingTasks.forEach((taskType, index) => {
                    plan.push(createOpeningPlanDay(
                        recommendations[index % recommendations.length],
                        taskType.task,
                        taskType.purpose
                    ));
                });
            }

            if (needsMiddlegame) {
                plan.push({
                    focus: "Middlegame Tactics",
                    category: "Middlegame",
                    task: "Review tactical misses and forcing moves",
                    purpose: "Practice calculation and candidate moves from your critical phase."
                });
            }

            if (needsEndgame) {
                plan.push({
                    focus: "Endgame Technique",
                    category: "Endgame",
                    task: "Practice conversion and defensive endgame basics",
                    purpose: "Spend time on simplifying, converting, and holding late positions."
                });
            }

            if (needsExtraOpening) {
                plan.push(createOpeningPlanDay(
                    recommendations[0],
                    "Extra opening review",
                    "Check move-order traps and early plans from your most common loss phase."
                ));
            }

            const fillDays = [
                createOpeningPlanDay(
                    recommendations[0],
                    "Compare your results",
                    "Connect the study plan to your actual games and note recurring positions."
                ),
                {
                    focus: "Critical Positions",
                    category: "Review",
                    task: "Review two recent turning points",
                    purpose: "Find the first moment where your plan became unclear."
                },
                createOpeningPlanDay(
                    recommendations[1] || recommendations[0],
                    "Final opening review",
                    "Lock in the ideas you want to keep practicing next."
                ),
                {
                    focus: "Full Game Review",
                    category: "Review",
                    task: "Replay one loss without engine help first",
                    purpose: "Build your own diagnosis before checking details."
                }
            ];

            let fillIndex = 0;
            while (plan.length < 7) {
                plan.push(fillDays[fillIndex % fillDays.length]);
                fillIndex += 1;
            }

            return plan.slice(0, 7).map((day, index) => ({
                ...day,
                day: index + 1
            }));
        }

        function getStudyDayAction(day) {
            const category = String(day?.category || "").toLowerCase();
            const focus = day?.openingName || day?.focus || "";

            if (category === "opening" && focus) {
                return {
                    primaryLabel: "Practice Opening",
                    primaryHref: `opening.html?name=${encodeURIComponent(focus)}&mode=practice`
                };
            }

            if (category === "middlegame" || focus.toLowerCase().includes("tactics")) {
                return {
                    primaryLabel: "Train Tactics",
                    primaryHref: "tactics.html"
                };
            }

            if (category === "endgame") {
                return {
                    disabledLabel: "Endgame training coming soon",
                    secondaryLabel: "Review Game",
                    secondaryHref: "review.html"
                };
            }

            return {
                primaryLabel: "Continue Study Plan",
                primaryHref: "profile.html"
            };
        }

        function renderQuickActions() {
            return `
                <div class="dashboard-actions">
                    <button onclick="window.location.href='profile.html'">Analyze Profile</button>
                    <button class="secondary-btn" onclick="window.location.href='review.html'">Review a Game</button>
                    <button class="secondary-btn" onclick="window.location.href='tactics.html'">Train Tactics</button>
                    <button class="secondary-btn" onclick="window.location.href='openings.html'">Opening Library</button>
                </div>
            `;
        }

        function renderTrainingProgress(progress) {
            return `
                <section class="dashboard-progress-section">
                    <div class="dashboard-progress-header">
                        <div>
                            <h2>Training Progress</h2>
                            <p>${escapeHtml(progress.message)}</p>
                        </div>
                        <div class="dashboard-score-pill">
                            <span>Total activity</span>
                            <strong>${safeNumber(progress.totalActivityScore)}</strong>
                        </div>
                    </div>

                    <div class="dashboard-progress-grid">
                        <div class="overview-card">
                            <h3>Study days</h3>
                            <p>${safeNumber(progress.studyDaysCompleted)}</p>
                        </div>
                        <div class="overview-card">
                            <h3>Tactics sessions</h3>
                            <p>${safeNumber(progress.tacticsSessionsCompleted)}</p>
                        </div>
                        <div class="overview-card">
                            <h3>Game reviews</h3>
                            <p>${safeNumber(progress.gameReviewsSaved)}</p>
                        </div>
                        <div class="overview-card">
                            <h3>Opening attempts</h3>
                            <p>${safeNumber(progress.openingPracticeAttempts)}</p>
                        </div>
                    </div>

                    <div class="dashboard-actions">
                        <button onclick="window.location.href='profile.html'">Continue Study Plan</button>
                        <button class="secondary-btn" onclick="window.location.href='tactics.html'">Train Tactics</button>
                        <button class="secondary-btn" onclick="window.location.href='review.html'">Review a Game</button>
                        <button class="secondary-btn" onclick="window.location.href='openings.html'">Practice Openings</button>
                    </div>
                </section>
            `;
        }

        function buildRecommendedAction(savedAnalysis, studyProgress, tacticsProgress, savedReview) {
            const lastTactics = tacticsProgress?.lastSession;
            const tacticsLowAccuracy = lastTactics && safeNumber(lastTactics.accuracy) < 70;

            if (studyProgress && studyProgress.completedCount < 7) {
                const plan = generateSevenDayPlan(savedAnalysis?.analysis || {});
                const day = plan.find(item => item.day === studyProgress.nextDay) || {
                    day: studyProgress.nextDay,
                    focus: `Day ${studyProgress.nextDay}`,
                    category: "Review",
                    task: "Continue your next study-plan task"
                };
                const action = getStudyDayAction(day);
                if (!action.secondaryHref && action.primaryHref !== "profile.html") {
                    action.secondaryLabel = "Continue Study Plan";
                    action.secondaryHref = "profile.html";
                }
                return {
                    title: `Continue Day ${day.day}`,
                    body: "Your 7-Day Study Plan has an unfinished day ready.",
                    meta: [
                        `Focus: ${day.focus}`,
                        `Category: ${day.category || "Review"}`,
                        `Task: ${day.task}`
                    ],
                    ...action
                };
            }

            if (savedReview) {
                const review = savedReview.data || {};
                const phase = String(review.estimated_phase || "").toLowerCase();
                const opening = review.opening || "";

                if (phase === "middlegame") {
                    return {
                        title: "Train tactics from your review",
                        body: "Your latest reviewed game reached its key phase in the middlegame.",
                        meta: [`Game: ${review.white || "White"} vs ${review.black || "Black"}`, `Phase: ${phase}`],
                        primaryLabel: "Train Tactics",
                        primaryHref: "tactics.html",
                        secondaryLabel: "Review Game",
                        secondaryHref: "review.html"
                    };
                }

                if (phase === "opening" && opening && opening !== "Unknown Opening") {
                    return {
                        title: "Study the reviewed opening",
                        body: "Your latest reviewed game points back to opening work.",
                        meta: [`Opening: ${opening}`, `Phase: ${phase}`],
                        primaryLabel: "Practice Opening",
                        primaryHref: `opening.html?name=${encodeURIComponent(opening)}&mode=practice`,
                        secondaryLabel: "Review Game",
                        secondaryHref: "review.html"
                    };
                }

                if (phase === "endgame") {
                    return {
                        title: "Review endgame notes",
                        body: "Your latest reviewed game reached the endgame. Dedicated endgame training is still coming soon.",
                        meta: [`Game: ${review.white || "White"} vs ${review.black || "Black"}`, `Phase: ${phase}`],
                        disabledLabel: "Endgame training coming soon",
                        secondaryLabel: "Review Game",
                        secondaryHref: "review.html"
                    };
                }

                return {
                    title: "Review your latest game",
                    body: "Use the saved single-game review to choose your next training target.",
                    meta: [`Opening: ${opening || "Unknown Opening"}`],
                    primaryLabel: "Review Game",
                    primaryHref: "review.html"
                };
            }

            if (tacticsProgress && tacticsLowAccuracy) {
                return {
                    title: "Train tactics next",
                    body: `Your last tactics accuracy was ${safeNumber(lastTactics.accuracy)}%. A short tactics session is the best next step.`,
                    primaryLabel: "Train Tactics",
                    primaryHref: "tactics.html"
                };
            }

            if (savedAnalysis) {
                return {
                    title: "Review recommended study",
                    body: "You have saved Chess.com game analysis. Review the recommended study targets and keep the plan moving.",
                    primaryLabel: "Continue Study Plan",
                    primaryHref: "profile.html"
                };
            }

            return {
                title: "Start with profile analysis",
                body: "Analyze your Chess.com profile to unlock game-based recommendations and a study plan.",
                primaryLabel: "Analyze Profile",
                primaryHref: "profile.html"
            };
        }

        function renderRecommendedAction(action) {
            const meta = Array.isArray(action.meta) && action.meta.length > 0
                ? `<div class="dashboard-next-meta">${action.meta.map(item => `<span>${escapeHtml(item)}</span>`).join("")}</div>`
                : "";
            const disabledAction = action.disabledLabel
                ? `<span class="module-soon-pill dashboard-disabled-action">${escapeHtml(action.disabledLabel)}</span>`
                : "";
            const primaryAction = action.primaryHref
                ? `<button onclick="window.location.href='${action.primaryHref}'">${escapeHtml(action.primaryLabel || "Continue")}</button>`
                : "";
            const secondaryAction = action.secondaryHref
                ? `<button class="secondary-btn" onclick="window.location.href='${action.secondaryHref}'">${escapeHtml(action.secondaryLabel || "Open")}</button>`
                : "";

            return `
                <div class="card dashboard-next-card">
                    <div>
                        <h2>Recommended Next Action</h2>
                        <h3>${escapeHtml(action.title)}</h3>
                        <p>${escapeHtml(action.body)}</p>
                        ${meta}
                    </div>
                    <div class="dashboard-next-actions">
                        ${disabledAction}
                        ${primaryAction}
                        ${secondaryAction}
                    </div>
                </div>
            `;
        }

        function renderDashboard() {
            const savedAnalysis = getSavedGameAnalysis();
            const studyProgress = getStudyPlanProgress(savedAnalysis);
            const tacticsProgress = getTacticsProgress();
            const savedReview = getSavedReview();
            const trainingProgress = getTrainingProgress(tacticsProgress);
            const hasAnyData = Boolean(savedAnalysis || studyProgress || tacticsProgress || savedReview);
            const nextAction = buildRecommendedAction(savedAnalysis, studyProgress, tacticsProgress, savedReview);
            const cards = [];

            if (savedAnalysis) {
                const analysis = savedAnalysis.analysis || {};
                const overall = analysis.overall || {};
                const study = Array.isArray(analysis.recommended_study) ? analysis.recommended_study : [];
                cards.push(`
                    <div class="card dashboard-card">
                        <h2>Latest game analysis</h2>
                        <p><strong>${escapeHtml(savedAnalysis.username || analysis.username || "Saved player")}</strong></p>
                        <p>${safeNumber(analysis.games_analyzed)} games analyzed</p>
                        <p>${safeNumber(overall.wins)}W / ${safeNumber(overall.draws)}D / ${safeNumber(overall.losses)}L</p>
                        <p>Top study target: ${escapeHtml(study[0]?.family || "No study target yet")}</p>
                    </div>
                `);
            }

            if (studyProgress) {
                cards.push(`
                    <div class="card dashboard-card">
                        <h2>Study plan progress</h2>
                        <p><strong>${studyProgress.completedCount}/7 days complete</strong></p>
                        <p>${studyProgress.nextDay ? `Next incomplete day: Day ${studyProgress.nextDay}` : "Plan complete"}</p>
                        <div class="dashboard-progress-bar">
                            <div class="dashboard-progress-fill" style="width: ${Math.round((studyProgress.completedCount / 7) * 100)}%"></div>
                        </div>
                    </div>
                `);
            }

            if (tacticsProgress) {
                const last = tacticsProgress.lastSession || {};
                cards.push(`
                    <div class="card dashboard-card">
                        <h2>Tactics progress</h2>
                        <p>Last accuracy: <strong>${safeNumber(last.accuracy)}%</strong></p>
                        <p>${safeNumber(last.correct)} correct over ${safeNumber(last.attempts)} attempts</p>
                        <p>Total completed sessions: ${safeNumber(tacticsProgress.sessions.length)}</p>
                    </div>
                `);
            }

            if (savedReview) {
                const review = savedReview.data || {};
                cards.push(`
                    <div class="card dashboard-card">
                        <h2>Last game review</h2>
                        <p><strong>${escapeHtml(review.opening || "Unknown Opening")}</strong></p>
                        <p>${escapeHtml(review.white || "White")} vs ${escapeHtml(review.black || "Black")} · ${escapeHtml(review.result || "*")}</p>
                        <p>Phase: ${escapeHtml(review.estimated_phase || "unknown")}</p>
                    </div>
                `);
            }

            document.getElementById("dashboardContent").innerHTML = `
                ${renderRecommendedAction(nextAction)}

                ${renderQuickActions()}

                ${renderTrainingProgress(trainingProgress)}

                ${
                    hasAnyData
                        ? `<div class="dashboard-grid">${cards.join("")}</div>`
                        : `
                            <div class="card dashboard-empty-state">
                                <h2>No saved Chessiax progress yet</h2>
                                <p>Start by analyzing your profile, reviewing one PGN, or completing a tactics session. Your coach dashboard will fill in automatically.</p>
                            </div>
                        `
                }
            `;
        }

        function setActiveNav() {
            const buttons = document.querySelectorAll(".brand-links button");
            buttons.forEach(button => {
                if (button.textContent.trim().toLowerCase() === "dashboard") {
                    button.classList.add("active-nav");
                }
            });
        }

        setActiveNav();
        renderDashboard();
    </script>
</body>

</html>
