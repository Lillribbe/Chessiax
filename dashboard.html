<!DOCTYPE html>
<html>

<div class="brand-bar">
    <div class="brand-logo" onclick="window.location.href='home.html'">
        ♞ Chessiax <span class="beta-badge">Beta</span>
    </div>
    <div class="brand-links">
        <button onclick="window.location.href='home.html'">Home</button>
        <button onclick="window.location.href='dashboard.html'">Dashboard</button>
        <button onclick="window.location.href='openings.html'">Library</button>
        <button onclick="window.location.href='index.html'">Analyze</button>
        <button onclick="window.location.href='tactics.html'">Tactics</button>
        <button onclick="window.location.href='review.html'">Review</button>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <button class="back-btn" onclick="window.location.href='home.html'">🏠 Home</button>

        <section class="page-hero dashboard-hero">
            <div class="hero-badge">Coach Hub</div>
            <h1>Coach Dashboard</h1>
            <p>See your current Chessiax progress and pick the next useful training step.</p>
        </section>

        <section id="dashboardContent" class="dashboard-stack"></section>

        <footer class="app-footer">
            <div>
                <strong>Chessiax</strong>
                <p>AI-powered chess opening training for learning, practice and progress tracking.</p>
            </div>

            <div class="footer-links">
                <button onclick="window.location.href='home.html'">Home</button>
                <button onclick="window.location.href='dashboard.html'">Dashboard</button>
                <button onclick="window.location.href='openings.html'">Library</button>
                <button onclick="window.location.href='index.html'">Analyze</button>
                <button onclick="window.location.href='tactics.html'">Tactics</button>
                <button onclick="window.location.href='review.html'">Review</button>
            </div>
        </footer>

    </div>

    <script>
        const GAME_ANALYSIS_STORAGE_KEY = "chessiax_game_analysis";
        const STUDY_PLAN_PROGRESS_PREFIX = "chessiax_study_plan_progress_";
        const TACTICS_PROGRESS_STORAGE_KEY = "chessiax_tactics_progress";
        const SAVED_REVIEW_STORAGE_KEY = "chessiax_saved_game_review";
        const TRAINING_GOAL_STORAGE_KEY = "chessiax_training_goal";
        const COACH_NOTES_STORAGE_KEY = "chessiax_coach_notes";
        const TRAINING_GOALS = {
            balanced: {
                label: "Balanced improvement",
                description: "Keep openings, tactics, reviews, and consistency moving together."
            },
            openings: {
                label: "Improve openings",
                description: "Prioritize opening study, opening practice, and opening-related plan days."
            },
            tactics: {
                label: "Improve tactics",
                description: "Prioritize calculation, tactical pattern work, and middlegame training."
            },
            reviews: {
                label: "Review more games",
                description: "Prioritize reviewing PGNs and turning games into practical training notes."
            },
            consistency: {
                label: "Build consistency",
                description: "Prioritize small repeatable actions and unfinished study-plan days."
            }
        };

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function safeNumber(value, fallback = 0) {
            return Number.isFinite(Number(value)) ? Number(value) : fallback;
        }

        function safeReadJson(key, fallback = null) {
            try {
                const saved = localStorage.getItem(key);
                if (!saved) {
                    return fallback;
                }

                return JSON.parse(saved);
            } catch (error) {
                console.warn(`Could not read ${key}`, error);
                return fallback;
            }
        }

        function formatDate(value) {
            if (!value) {
                return "N/A";
            }

            const date = new Date(value);
            if (Number.isNaN(date.getTime())) {
                return "N/A";
            }

            return date.toLocaleDateString(undefined, {
                year: "numeric",
                month: "short",
                day: "numeric"
            });
        }

        function formatDateTime(value) {
            if (!value) {
                return "N/A";
            }

            const date = new Date(value);
            if (Number.isNaN(date.getTime())) {
                return "N/A";
            }

            return date.toLocaleString(undefined, {
                year: "numeric",
                month: "short",
                day: "numeric",
                hour: "2-digit",
                minute: "2-digit"
            });
        }

        function getStudyPlanProgressKey(username) {
            return `${STUDY_PLAN_PROGRESS_PREFIX}${String(username || "unknown").trim().toLowerCase()}`;
        }

        function getSavedGameAnalysis() {
            const saved = safeReadJson(GAME_ANALYSIS_STORAGE_KEY);
            return saved && saved.analysis ? saved : null;
        }

        function getStudyPlanProgress(savedAnalysis) {
            const candidates = [];

            if (savedAnalysis?.username) {
                candidates.push({
                    username: savedAnalysis.username,
                    key: getStudyPlanProgressKey(savedAnalysis.username)
                });
            }

            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith(STUDY_PLAN_PROGRESS_PREFIX)) {
                    candidates.push({
                        username: key.replace(STUDY_PLAN_PROGRESS_PREFIX, ""),
                        key
                    });
                }
            }

            for (const candidate of candidates) {
                const days = safeReadJson(candidate.key, []);
                const completedDays = Array.isArray(days)
                    ? [...new Set(days.filter(day => Number.isInteger(day) && day >= 1 && day <= 7))].sort((a, b) => a - b)
                    : [];

                if (completedDays.length > 0) {
                    return {
                        username: candidate.username,
                        completedDays,
                        completedCount: completedDays.length,
                        nextDay: [1, 2, 3, 4, 5, 6, 7].find(day => !completedDays.includes(day)) || null
                    };
                }
            }

            return null;
        }

        function getTacticsProgress() {
            const progress = safeReadJson(TACTICS_PROGRESS_STORAGE_KEY);
            if (!progress || !Array.isArray(progress.sessions) || progress.sessions.length === 0) {
                return null;
            }

            return {
                sessions: progress.sessions,
                lastSession: progress.lastSession || progress.sessions[progress.sessions.length - 1]
            };
        }

        function getSavedReview() {
            const saved = safeReadJson(SAVED_REVIEW_STORAGE_KEY);
            return saved && saved.data ? saved : null;
        }

        function getCoachNotes() {
            const notes = safeReadJson(COACH_NOTES_STORAGE_KEY, []);
            return Array.isArray(notes)
                ? notes.filter(note => note && typeof note.text === "string" && note.timestamp)
                : [];
        }

        function clearCoachNotes() {
            try {
                localStorage.removeItem(COACH_NOTES_STORAGE_KEY);
            } catch (error) {
                console.warn("Could not clear coach notes", error);
            }

            renderDashboard();
        }

        function getSavedTrainingGoal() {
            const goal = safeReadJson(TRAINING_GOAL_STORAGE_KEY, "balanced");
            return TRAINING_GOALS[goal] ? goal : "balanced";
        }

        function saveTrainingGoal() {
            const select = document.getElementById("trainingGoalSelect");
            const goal = TRAINING_GOALS[select?.value] ? select.value : "balanced";

            try {
                localStorage.setItem(TRAINING_GOAL_STORAGE_KEY, JSON.stringify(goal));
            } catch (error) {
                console.warn("Could not save training goal", error);
            }

            renderDashboard();
        }

        function clearTrainingGoal() {
            try {
                localStorage.removeItem(TRAINING_GOAL_STORAGE_KEY);
            } catch (error) {
                console.warn("Could not clear training goal", error);
            }

            renderDashboard();
        }

        function getReviewHistory() {
            const history = safeReadJson("chessiax_review_history", []);
            return Array.isArray(history) ? history.filter(item => item && item.data) : [];
        }

        function getAllStudyDaysCompleted() {
            const completedDays = new Set();

            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (!key || !key.startsWith(STUDY_PLAN_PROGRESS_PREFIX)) {
                    continue;
                }

                const days = safeReadJson(key, []);
                if (!Array.isArray(days)) {
                    continue;
                }

                days.forEach(day => {
                    if (Number.isInteger(day) && day >= 1 && day <= 7) {
                        completedDays.add(`${key}:${day}`);
                    }
                });
            }

            return completedDays.size;
        }

        function getOpeningPracticeAttempts() {
            let attempts = 0;

            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (!key || !key.startsWith("practice_stats_")) {
                    continue;
                }

                const stats = safeReadJson(key, {});
                attempts += safeNumber(stats?.attempts);
            }

            return attempts;
        }

        function calculateOpeningMastery(stats) {
            if (!stats) {
                return 0;
            }

            const bestAccuracy = safeNumber(stats.bestAccuracy);
            const lastAccuracy = safeNumber(stats.lastAccuracy);
            const attempts = safeNumber(stats.attempts);
            return Math.min(100, Math.round((bestAccuracy * 0.6) + (lastAccuracy * 0.3) + Math.min(attempts * 2, 10)));
        }

        function getMasteryStatus(score) {
            if (score <= 30) {
                return "New";
            }
            if (score <= 60) {
                return "Learning";
            }
            if (score <= 85) {
                return "Improving";
            }
            return "Strong";
        }

        function getOpeningMasteryItems() {
            const items = [];

            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (!key || !key.startsWith("practice_stats_")) {
                    continue;
                }

                const stats = safeReadJson(key, null);
                if (!stats || typeof stats !== "object") {
                    continue;
                }

                const opening = key.replace("practice_stats_", "");
                const mastery = calculateOpeningMastery(stats);
                items.push({
                    opening,
                    stats,
                    mastery,
                    status: getMasteryStatus(mastery),
                    lastPracticedTime: stats.lastPracticed ? new Date(stats.lastPracticed).getTime() : 0
                });
            }

            return items;
        }

        function getActivityMessage(score) {
            if (score === 0) {
                return "Start your first training session.";
            }
            if (score <= 3) {
                return "Good start — keep building momentum.";
            }
            if (score <= 8) {
                return "Strong progress this week.";
            }
            return "Excellent consistency.";
        }

        function getTrainingProgress(tacticsProgress) {
            const studyDaysCompleted = getAllStudyDaysCompleted();
            const tacticsSessionsCompleted = tacticsProgress?.sessions?.length || 0;
            const gameReviewsSaved = getReviewHistory().length;
            const openingPracticeAttempts = getOpeningPracticeAttempts();
            const totalActivityScore = (
                studyDaysCompleted +
                tacticsSessionsCompleted +
                gameReviewsSaved +
                openingPracticeAttempts
            );

            return {
                studyDaysCompleted,
                tacticsSessionsCompleted,
                gameReviewsSaved,
                openingPracticeAttempts,
                totalActivityScore,
                message: getActivityMessage(totalActivityScore)
            };
        }

        function getRecommendedStudyItems(data) {
            return Array.isArray(data?.recommended_study) ? data.recommended_study : [];
        }

        function phaseNeedsWork(weaknessBreakdown, area) {
            if (!Array.isArray(weaknessBreakdown)) {
                return false;
            }

            return weaknessBreakdown.some(item =>
                String(item?.area || "").toLowerCase() === area
                && String(item?.status || "").toLowerCase() === "needs work"
            );
        }

        function createOpeningPlanDay(studyItem, task, purpose) {
            const focus = studyItem?.family || studyItem?.opening || "Opening Review";
            return {
                focus,
                category: "Opening",
                task,
                purpose,
                openingName: studyItem ? focus : ""
            };
        }

        function createTacticsPlanDay(task, purpose) {
            return {
                focus: "Middlegame Tactics",
                category: "Middlegame",
                task,
                purpose,
                actionLabel: "Train Tactics",
                actionHref: "tactics.html"
            };
        }

        function createReviewPlanDay(task, purpose) {
            return {
                focus: "Game Review",
                category: "Review",
                task,
                purpose,
                actionLabel: "Review Game",
                actionHref: "review.html"
            };
        }

        function createEndgamePlanDay(task, purpose) {
            return {
                focus: "Endgame Technique",
                category: "Endgame",
                task,
                purpose,
                actionLabel: "Endgame Training Coming Soon"
            };
        }

        function generateSevenDayPlan(data, goal = "balanced") {
            const recommendations = getRecommendedStudyItems(data);
            const phaseSummary = data && typeof data.phase_summary === "object" ? data.phase_summary : {};
            const weaknessBreakdown = Array.isArray(data?.weakness_breakdown) ? data.weakness_breakdown : [];
            const mostCommonLossPhase = String(phaseSummary?.most_common_loss_phase || "none").toLowerCase();
            const needsMiddlegame = phaseNeedsWork(weaknessBreakdown, "middlegame") || mostCommonLossPhase === "middlegame";
            const needsEndgame = phaseNeedsWork(weaknessBreakdown, "endgame") || mostCommonLossPhase === "endgame";
            const needsExtraOpening = mostCommonLossPhase === "opening";
            const trainingGoal = TRAINING_GOALS[goal] ? goal : "balanced";
            const plan = [];

            const openingTasks = [
                { task: "Learn the main ideas", purpose: "Understand the plans before memorizing moves." },
                { task: "Practice the opening line", purpose: "Build comfort with the first critical moves." },
                { task: "Review common mistakes", purpose: "Spot the patterns that usually cost you points." },
                { task: "Repeat from memory", purpose: "Strengthen recall without relying on notes." }
            ];

            const addOpeningTasks = (count, customTasks = openingTasks) => {
                if (recommendations.length === 0) {
                    return;
                }

                customTasks.slice(0, count).forEach((taskType, index) => {
                    plan.push(createOpeningPlanDay(
                        recommendations[index % recommendations.length],
                        taskType.task,
                        taskType.purpose
                    ));
                });
            };

            if (trainingGoal === "openings") {
                addOpeningTasks(4);
                plan.push(createOpeningPlanDay(
                    recommendations[0],
                    "Practice weakest opening",
                    "Target the opening family that needs the most repetition."
                ));
                plan.push(createOpeningPlanDay(
                    recommendations[1] || recommendations[0],
                    "Compare plans from memory",
                    "Recall the main ideas before starting practice."
                ));
                plan.push(createReviewPlanDay(
                    "Review one game from this opening",
                    "Connect opening study to a real game."
                ));
            } else if (trainingGoal === "tactics") {
                addOpeningTasks(1);
                plan.push(createTacticsPlanDay("Solve forcing-move patterns", "Practice checks, captures, and threats."));
                plan.push(createTacticsPlanDay("Practice tactical misses", "Turn middlegame weaknesses into pattern recognition."));
                plan.push(createTacticsPlanDay("Review candidate moves", "Compare at least two forcing options before choosing."));
                plan.push(createReviewPlanDay("Identify the critical phase", "Use one PGN review to find where tactics changed the game."));
                plan.push(createTacticsPlanDay("Repeat the hardest puzzles", "Build accuracy by revisiting missed patterns."));
            } else if (trainingGoal === "reviews") {
                addOpeningTasks(1);
                plan.push(createReviewPlanDay("Review one recent game", "Write down one practical lesson."));
                plan.push(createReviewPlanDay("Identify the critical phase", "Decide whether the opening, middlegame, or endgame caused the result."));
                plan.push(createReviewPlanDay("Compare with previous reviews", "Look for repeating themes across games."));
                plan.push(createReviewPlanDay("Save a lesson from the game", "Turn the review into one concrete training task."));
                plan.push(createTacticsPlanDay("Practice one review theme", "Reinforce tactical themes from your review."));
            } else if (trainingGoal === "consistency") {
                addOpeningTasks(1, [{ task: "Practice one short opening line", purpose: "Keep the task small enough to finish today." }]);
                plan.push(createTacticsPlanDay("Solve a short tactics set", "Keep calculation warm with a compact session."));
                plan.push(createReviewPlanDay("Review one turning point", "One useful lesson is enough to keep momentum."));
                addOpeningTasks(1, [{ task: "Repeat from memory", purpose: "A quick recall pass keeps the habit alive." }]);
                plan.push(createTacticsPlanDay("Practice checks and captures", "Stay sharp with a low-friction tactical habit."));
                plan.push(createReviewPlanDay("Save one lesson", "Write down the smallest next improvement from a game."));
            } else {
                addOpeningTasks(4);

                if (needsMiddlegame) {
                    plan.push(createTacticsPlanDay(
                        "Review tactical misses and forcing moves",
                        "Practice calculation and candidate moves from your critical phase."
                    ));
                }

                if (needsEndgame) {
                    plan.push(createEndgamePlanDay(
                        "Practice conversion and defensive endgame basics",
                        "Spend time on simplifying, converting, and holding late positions."
                    ));
                }

                if (needsExtraOpening) {
                    plan.push(createOpeningPlanDay(
                        recommendations[0],
                        "Extra opening review",
                        "Check move-order traps and early plans from your most common loss phase."
                    ));
                }
            }

            const fillDays = [
                createOpeningPlanDay(
                    recommendations[0],
                    "Compare your results",
                    "Connect the study plan to your actual games and note recurring positions."
                ),
                createReviewPlanDay(
                    "Review two recent turning points",
                    "Find the first moment where your plan became unclear."
                ),
                createOpeningPlanDay(
                    recommendations[1] || recommendations[0],
                    "Final opening review",
                    "Lock in the ideas you want to keep practicing next."
                ),
                createReviewPlanDay(
                    "Replay one loss without engine help first",
                    "Build your own diagnosis before checking details."
                ),
                createTacticsPlanDay(
                    "Practice a short tactics set",
                    "Keep calculation active alongside opening study."
                )
            ];

            let fillIndex = 0;
            while (plan.length < 7) {
                plan.push(fillDays[fillIndex % fillDays.length]);
                fillIndex += 1;
            }

            return plan.slice(0, 7).map((day, index) => ({
                ...day,
                day: index + 1
            }));
        }

        function getStudyDayAction(day) {
            const category = String(day?.category || "").toLowerCase();
            const openingName = day?.openingName || "";
            const focus = day?.focus || "";

            if (category === "opening" && openingName) {
                return {
                    primaryLabel: "Practice Opening",
                    primaryHref: `opening.html?name=${encodeURIComponent(openingName)}&mode=practice`
                };
            }

            if (category === "opening") {
                return {
                    primaryLabel: "Opening Library",
                    primaryHref: "openings.html"
                };
            }

            if (day?.actionHref) {
                return {
                    primaryLabel: day.actionLabel || "Continue",
                    primaryHref: day.actionHref
                };
            }

            if (category === "middlegame" || focus.toLowerCase().includes("tactics")) {
                return {
                    primaryLabel: "Train Tactics",
                    primaryHref: "tactics.html"
                };
            }

            if (category === "endgame") {
                return {
                    disabledLabel: "Endgame training coming soon",
                    secondaryLabel: "Review Game",
                    secondaryHref: "review.html"
                };
            }

            return {
                primaryLabel: "Continue Study Plan",
                primaryHref: "profile.html"
            };
        }

        function findNextGoalStudyDay(savedAnalysis, studyProgress, goal) {
            if (!studyProgress || studyProgress.completedCount >= 7) {
                return null;
            }

            const plan = generateSevenDayPlan(savedAnalysis?.analysis || {}, goal);
            const incompleteDays = plan.filter(day => !studyProgress.completedDays.includes(day.day));
            if (!incompleteDays.length) {
                return null;
            }

            if (goal === "openings") {
                return incompleteDays.find(day => String(day.category || "").toLowerCase() === "opening") || incompleteDays[0];
            }

            if (goal === "tactics") {
                return incompleteDays.find(day => {
                    const category = String(day.category || "").toLowerCase();
                    const focus = String(day.focus || "").toLowerCase();
                    return category === "middlegame" || focus.includes("tactics");
                }) || incompleteDays[0];
            }

            if (goal === "reviews") {
                return incompleteDays.find(day => String(day.category || "").toLowerCase() === "review") || incompleteDays[0];
            }

            return incompleteDays.find(day => day.day === studyProgress.nextDay) || incompleteDays[0];
        }

        function renderQuickActions() {
            return `
                <div class="dashboard-actions">
                    <button onclick="window.location.href='profile.html'">Analyze Profile</button>
                    <button class="secondary-btn" onclick="window.location.href='review.html'">Review a Game</button>
                    <button class="secondary-btn" onclick="window.location.href='tactics.html'">Train Tactics</button>
                    <button class="secondary-btn" onclick="window.location.href='openings.html'">Opening Library</button>
                </div>
            `;
        }

        function renderTrainingProgress(progress) {
            return `
                <section class="dashboard-progress-section">
                    <div class="dashboard-progress-header">
                        <div>
                            <h2>Training Progress</h2>
                            <p>${escapeHtml(progress.message)}</p>
                        </div>
                        <div class="dashboard-score-pill">
                            <span>Total activity</span>
                            <strong>${safeNumber(progress.totalActivityScore)}</strong>
                        </div>
                    </div>

                    <div class="dashboard-progress-grid">
                        <div class="overview-card">
                            <h3>Study days</h3>
                            <p>${safeNumber(progress.studyDaysCompleted)}</p>
                        </div>
                        <div class="overview-card">
                            <h3>Tactics sessions</h3>
                            <p>${safeNumber(progress.tacticsSessionsCompleted)}</p>
                        </div>
                        <div class="overview-card">
                            <h3>Game reviews</h3>
                            <p>${safeNumber(progress.gameReviewsSaved)}</p>
                        </div>
                        <div class="overview-card">
                            <h3>Opening attempts</h3>
                            <p>${safeNumber(progress.openingPracticeAttempts)}</p>
                        </div>
                    </div>

                    <div class="dashboard-actions">
                        <button onclick="window.location.href='profile.html'">Continue Study Plan</button>
                        <button class="secondary-btn" onclick="window.location.href='tactics.html'">Train Tactics</button>
                        <button class="secondary-btn" onclick="window.location.href='review.html'">Review a Game</button>
                        <button class="secondary-btn" onclick="window.location.href='openings.html'">Practice Openings</button>
                    </div>
                </section>
            `;
        }

        function renderTrainingGoal(goal) {
            const selectedGoal = TRAINING_GOALS[goal] ? goal : "balanced";
            const options = Object.entries(TRAINING_GOALS).map(([value, item]) => `
                <option value="${value}" ${value === selectedGoal ? "selected" : ""}>${escapeHtml(item.label)}</option>
            `).join("");

            return `
                <section class="card dashboard-goal-card">
                    <div>
                        <h2>Your Training Goal</h2>
                        <p>${escapeHtml(TRAINING_GOALS[selectedGoal].description)}</p>
                    </div>
                    <div class="dashboard-goal-controls">
                        <select id="trainingGoalSelect" aria-label="Training goal">${options}</select>
                        <button onclick="saveTrainingGoal()">Save Goal</button>
                        <button class="secondary-btn" onclick="clearTrainingGoal()">Clear Goal</button>
                    </div>
                </section>
            `;
        }

        function renderCoachNotes(notes) {
            const latestNotes = notes.slice(0, 5);
            const noteCards = latestNotes.length
                ? latestNotes.map(note => `
                    <div class="coach-note-list-card">
                        <div class="coach-note-meta">
                            <strong>${escapeHtml(note.source || "Coach Note")}</strong>
                            <span>${escapeHtml(formatDateTime(note.timestamp))}</span>
                        </div>
                        <p>${escapeHtml(note.text)}</p>
                    </div>
                `).join("")
                : `
                    <div class="coach-note-empty">
                        <h3>No coach notes yet.</h3>
                        <p>Save lessons after a game review or tactics session to build your personal training journal.</p>
                    </div>
                `;

            return `
                <section class="card dashboard-coach-notes">
                    <div class="dashboard-coach-notes-header">
                        <div>
                            <h2>Coach Notes</h2>
                            <p>Your latest lessons learned across Chessiax.</p>
                        </div>
                        <button class="secondary-btn" onclick="clearCoachNotes()" ${notes.length ? "" : "disabled"}>Clear Notes</button>
                    </div>
                    <div class="coach-notes-list">
                        ${noteCards}
                    </div>
                </section>
            `;
        }

        function renderMasteryList(items, emptyText) {
            if (!items.length) {
                return `<p class="opening-mastery-empty">${escapeHtml(emptyText)}</p>`;
            }

            return items.map(item => `
                <div class="opening-mastery-row">
                    <div>
                        <strong>${escapeHtml(item.opening)}</strong>
                        <span>${escapeHtml(item.status)} · ${safeNumber(item.stats.attempts)} attempts</span>
                    </div>
                    <div class="opening-mastery-row-score">${safeNumber(item.mastery)}%</div>
                </div>
            `).join("");
        }

        function renderOpeningMasterySection(items) {
            if (!items.length) {
                return `
                    <section class="card dashboard-opening-mastery">
                        <h2>Opening Mastery</h2>
                        <div class="coach-note-empty">
                            <h3>No opening mastery yet.</h3>
                            <p>Practice an opening to build your first mastery score.</p>
                        </div>
                    </section>
                `;
            }

            const topOpenings = [...items]
                .sort((a, b) => b.mastery - a.mastery)
                .slice(0, 3);
            const reviewOpenings = [...items]
                .sort((a, b) => {
                    if (a.mastery !== b.mastery) {
                        return a.mastery - b.mastery;
                    }
                    return a.lastPracticedTime - b.lastPracticedTime;
                })
                .slice(0, 3);

            return `
                <section class="card dashboard-opening-mastery">
                    <div class="dashboard-opening-mastery-header">
                        <div>
                            <h2>Opening Mastery</h2>
                            <p>Practice scores based on best accuracy, latest accuracy, and attempts.</p>
                        </div>
                        <button class="secondary-btn" onclick="window.location.href='openings.html'">Practice Openings</button>
                    </div>
                    <div class="opening-mastery-dashboard-grid">
                        <div>
                            <h3>Top mastered</h3>
                            ${renderMasteryList(topOpenings, "No mastered openings yet.")}
                        </div>
                        <div>
                            <h3>Needs review</h3>
                            ${renderMasteryList(reviewOpenings, "No review targets yet.")}
                        </div>
                    </div>
                </section>
            `;
        }

        function buildGoalAction(goal, savedAnalysis, savedReview) {
            if (goal === "openings") {
                const study = getRecommendedStudyItems(savedAnalysis?.analysis || {});
                const opening = study[0]?.family || savedReview?.data?.opening;
                if (opening && opening !== "Unknown Opening") {
                    return {
                        title: "Practice openings next",
                        body: "Your selected goal is opening improvement, so start with a focused opening practice session.",
                        meta: [`Opening: ${opening}`],
                        primaryLabel: "Practice Opening",
                        primaryHref: `opening.html?name=${encodeURIComponent(opening)}&mode=practice`,
                        secondaryLabel: "Opening Library",
                        secondaryHref: "openings.html"
                    };
                }

                return {
                    title: "Build your opening base",
                    body: "Your selected goal is opening improvement. Pick an opening from the library and practice the first critical line.",
                    primaryLabel: "Opening Library",
                    primaryHref: "openings.html"
                };
            }

            if (goal === "tactics") {
                return {
                    title: "Train tactics next",
                    body: "Your selected goal is tactical improvement. A short tactics session is the clearest next step.",
                    primaryLabel: "Train Tactics",
                    primaryHref: "tactics.html"
                };
            }

            if (goal === "reviews") {
                return {
                    title: "Review another game",
                    body: "Your selected goal is reviewing more games. Paste one PGN and turn it into training notes.",
                    primaryLabel: "Review Game",
                    primaryHref: "review.html"
                };
            }

            if (goal === "consistency") {
                return {
                    title: "Keep the streak alive",
                    body: "Your selected goal is consistency. Choose one quick training action and complete it today.",
                    primaryLabel: "Train Tactics",
                    primaryHref: "tactics.html",
                    secondaryLabel: "Review Game",
                    secondaryHref: "review.html"
                };
            }

            return null;
        }

        function buildRecommendedAction(savedAnalysis, studyProgress, tacticsProgress, savedReview, goal = "balanced") {
            const lastTactics = tacticsProgress?.lastSession;
            const tacticsLowAccuracy = lastTactics && safeNumber(lastTactics.accuracy) < 70;

            if (studyProgress && studyProgress.completedCount < 7) {
                const day = findNextGoalStudyDay(savedAnalysis, studyProgress, goal) || {
                    day: studyProgress.nextDay,
                    focus: `Day ${studyProgress.nextDay}`,
                    category: "Review",
                    task: "Continue your next study-plan task"
                };
                const action = getStudyDayAction(day);
                if (!action.secondaryHref && action.primaryHref !== "profile.html") {
                    action.secondaryLabel = "Continue Study Plan";
                    action.secondaryHref = "profile.html";
                }
                return {
                    title: `Continue Day ${day.day}`,
                    body: "Your 7-Day Study Plan has an unfinished day ready.",
                    meta: [
                        `Focus: ${day.focus}`,
                        `Category: ${day.category || "Review"}`,
                        `Task: ${day.task}`
                    ],
                    ...action
                };
            }

            if (goal !== "balanced") {
                const goalAction = buildGoalAction(goal, savedAnalysis, savedReview);
                if (goalAction) {
                    return goalAction;
                }
            }

            if (savedReview) {
                const review = savedReview.data || {};
                const phase = String(review.estimated_phase || "").toLowerCase();
                const opening = review.opening || "";

                if (phase === "middlegame") {
                    return {
                        title: "Train tactics from your review",
                        body: "Your latest reviewed game reached its key phase in the middlegame.",
                        meta: [`Game: ${review.white || "White"} vs ${review.black || "Black"}`, `Phase: ${phase}`],
                        primaryLabel: "Train Tactics",
                        primaryHref: "tactics.html",
                        secondaryLabel: "Review Game",
                        secondaryHref: "review.html"
                    };
                }

                if (phase === "opening" && opening && opening !== "Unknown Opening") {
                    return {
                        title: "Study the reviewed opening",
                        body: "Your latest reviewed game points back to opening work.",
                        meta: [`Opening: ${opening}`, `Phase: ${phase}`],
                        primaryLabel: "Practice Opening",
                        primaryHref: `opening.html?name=${encodeURIComponent(opening)}&mode=practice`,
                        secondaryLabel: "Review Game",
                        secondaryHref: "review.html"
                    };
                }

                if (phase === "endgame") {
                    return {
                        title: "Review endgame notes",
                        body: "Your latest reviewed game reached the endgame. Dedicated endgame training is still coming soon.",
                        meta: [`Game: ${review.white || "White"} vs ${review.black || "Black"}`, `Phase: ${phase}`],
                        disabledLabel: "Endgame training coming soon",
                        secondaryLabel: "Review Game",
                        secondaryHref: "review.html"
                    };
                }

                return {
                    title: "Review your latest game",
                    body: "Use the saved single-game review to choose your next training target.",
                    meta: [`Opening: ${opening || "Unknown Opening"}`],
                    primaryLabel: "Review Game",
                    primaryHref: "review.html"
                };
            }

            if (tacticsProgress && tacticsLowAccuracy) {
                return {
                    title: "Train tactics next",
                    body: `Your last tactics accuracy was ${safeNumber(lastTactics.accuracy)}%. A short tactics session is the best next step.`,
                    primaryLabel: "Train Tactics",
                    primaryHref: "tactics.html"
                };
            }

            if (savedAnalysis) {
                return {
                    title: "Review recommended study",
                    body: "You have saved Chess.com game analysis. Review the recommended study targets and keep the plan moving.",
                    primaryLabel: "Continue Study Plan",
                    primaryHref: "profile.html"
                };
            }

            return {
                title: "Start with profile analysis",
                body: "Analyze your Chess.com profile to unlock game-based recommendations and a study plan.",
                primaryLabel: "Analyze Profile",
                primaryHref: "profile.html"
            };
        }

        function renderRecommendedAction(action) {
            const meta = Array.isArray(action.meta) && action.meta.length > 0
                ? `<div class="dashboard-next-meta">${action.meta.map(item => `<span>${escapeHtml(item)}</span>`).join("")}</div>`
                : "";
            const disabledAction = action.disabledLabel
                ? `<span class="module-soon-pill dashboard-disabled-action">${escapeHtml(action.disabledLabel)}</span>`
                : "";
            const primaryAction = action.primaryHref
                ? `<button onclick="window.location.href='${action.primaryHref}'">${escapeHtml(action.primaryLabel || "Continue")}</button>`
                : "";
            const secondaryAction = action.secondaryHref
                ? `<button class="secondary-btn" onclick="window.location.href='${action.secondaryHref}'">${escapeHtml(action.secondaryLabel || "Open")}</button>`
                : "";

            return `
                <div class="card dashboard-next-card">
                    <div>
                        <h2>Recommended Next Action</h2>
                        <h3>${escapeHtml(action.title)}</h3>
                        <p>${escapeHtml(action.body)}</p>
                        ${meta}
                    </div>
                    <div class="dashboard-next-actions">
                        ${disabledAction}
                        ${primaryAction}
                        ${secondaryAction}
                    </div>
                </div>
            `;
        }

        function renderDashboard() {
            const savedAnalysis = getSavedGameAnalysis();
            const studyProgress = getStudyPlanProgress(savedAnalysis);
            const tacticsProgress = getTacticsProgress();
            const savedReview = getSavedReview();
            const coachNotes = getCoachNotes();
            const openingMasteryItems = getOpeningMasteryItems();
            const trainingProgress = getTrainingProgress(tacticsProgress);
            const selectedGoal = getSavedTrainingGoal();
            const nextAction = buildRecommendedAction(savedAnalysis, studyProgress, tacticsProgress, savedReview, selectedGoal);
            const cards = [];

            if (savedAnalysis) {
                const analysis = savedAnalysis.analysis || {};
                const overall = analysis.overall || {};
                const study = Array.isArray(analysis.recommended_study) ? analysis.recommended_study : [];
                cards.push(`
                    <div class="card dashboard-card">
                        <h2>Latest game analysis</h2>
                        <p><strong>${escapeHtml(savedAnalysis.username || analysis.username || "Saved player")}</strong></p>
                        <p>${safeNumber(analysis.games_analyzed)} games analyzed</p>
                        <p>${safeNumber(overall.wins)}W / ${safeNumber(overall.draws)}D / ${safeNumber(overall.losses)}L</p>
                        <p>Top study target: ${escapeHtml(study[0]?.family || "No study target yet")}</p>
                    </div>
                `);
            }

            if (studyProgress) {
                cards.push(`
                    <div class="card dashboard-card">
                        <h2>Study plan progress</h2>
                        <p><strong>${studyProgress.completedCount}/7 days complete</strong></p>
                        <p>${studyProgress.nextDay ? `Next incomplete day: Day ${studyProgress.nextDay}` : "Plan complete"}</p>
                        <div class="dashboard-progress-bar">
                            <div class="dashboard-progress-fill" style="width: ${Math.round((studyProgress.completedCount / 7) * 100)}%"></div>
                        </div>
                    </div>
                `);
            }

            if (tacticsProgress) {
                const last = tacticsProgress.lastSession || {};
                cards.push(`
                    <div class="card dashboard-card">
                        <h2>Tactics progress</h2>
                        <p>Last accuracy: <strong>${safeNumber(last.accuracy)}%</strong></p>
                        <p>${safeNumber(last.correct)} correct over ${safeNumber(last.attempts)} attempts</p>
                        <p>Total completed sessions: ${safeNumber(tacticsProgress.sessions.length)}</p>
                    </div>
                `);
            }

            if (savedReview) {
                const review = savedReview.data || {};
                cards.push(`
                    <div class="card dashboard-card">
                        <h2>Last game review</h2>
                        <p><strong>${escapeHtml(review.opening || "Unknown Opening")}</strong></p>
                        <p>${escapeHtml(review.white || "White")} vs ${escapeHtml(review.black || "Black")} · ${escapeHtml(review.result || "*")}</p>
                        <p>Phase: ${escapeHtml(review.estimated_phase || "unknown")}</p>
                    </div>
                `);
            }

            document.getElementById("dashboardContent").innerHTML = `
                ${renderRecommendedAction(nextAction)}

                ${renderQuickActions()}

                ${renderTrainingGoal(selectedGoal)}

                ${renderTrainingProgress(trainingProgress)}

                ${renderOpeningMasterySection(openingMasteryItems)}

                ${renderCoachNotes(coachNotes)}

                ${
                    cards.length
                        ? `<div class="dashboard-grid">${cards.join("")}</div>`
                        : coachNotes.length
                            ? ""
                            : `
                            <div class="card dashboard-empty-state">
                                <h2>No saved Chessiax progress yet</h2>
                                <p>Start by analyzing your profile, reviewing one PGN, or completing a tactics session. Your coach dashboard will fill in automatically.</p>
                            </div>
                        `
                }
            `;
        }

        function setActiveNav() {
            const buttons = document.querySelectorAll(".brand-links button");
            buttons.forEach(button => {
                if (button.textContent.trim().toLowerCase() === "dashboard") {
                    button.classList.add("active-nav");
                }
            });
        }

        setActiveNav();
        renderDashboard();
    </script>
</body>

</html>
