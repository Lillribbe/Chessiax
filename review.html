<!DOCTYPE html>
<html>

<div class="brand-bar">
    <div class="brand-logo" onclick="window.location.href='home.html'">
        ♞ Chessiax <span class="beta-badge">Beta</span>
    </div>
    <div class="brand-links">
        <button onclick="window.location.href='home.html'">Home</button>
        <button onclick="window.location.href='openings.html'">Library</button>
        <button onclick="window.location.href='index.html'">Analyze</button>
        <button onclick="window.location.href='tactics.html'">Tactics</button>
        <button onclick="window.location.href='review.html'">Review</button>
    </div>
</div>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Review</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <button class="back-btn" onclick="window.location.href='home.html'">🏠 Home</button>

        <section class="page-hero review-hero">
            <div class="hero-badge">Single game analysis</div>
            <h1>Game Review</h1>
            <p>Paste a PGN and get a quick AI-style training breakdown.</p>
        </section>

        <section class="review-layout">
            <div class="card review-input-card">
                <h2>Paste Your PGN</h2>
                <label for="reviewUsername">Chess.com username, optional</label>
                <input id="reviewUsername" type="text" placeholder="Optional username">

                <label for="pgnInput">PGN</label>
                <textarea id="pgnInput" placeholder='[Event "Example"]&#10;[White "You"]&#10;[Black "Opponent"]&#10;[Result "1-0"]&#10;&#10;1. e4 e5 2. Nf3 Nc6 ...'></textarea>

                <button id="analyzePgnButton" onclick="analyzePgn()">Analyze Game</button>
            </div>

            <div id="reviewResult" class="review-result">
                <div class="card">
                    <h2>Review Result</h2>
                    <p>Your game breakdown will appear here.</p>
                </div>
            </div>
        </section>

        <footer class="app-footer">
            <div>
                <strong>Chessiax</strong>
                <p>AI-powered chess opening training for learning, practice and progress tracking.</p>
            </div>

            <div class="footer-links">
                <button onclick="window.location.href='home.html'">Home</button>
                <button onclick="window.location.href='openings.html'">Library</button>
                <button onclick="window.location.href='index.html'">Analyze</button>
                <button onclick="window.location.href='tactics.html'">Tactics</button>
                <button onclick="window.location.href='review.html'">Review</button>
            </div>
        </footer>

    </div>

    <script src="config.js"></script>

    <script>
        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function safeText(value, fallback = "Unknown") {
            const text = String(value ?? "").trim();
            return text || fallback;
        }

        function renderTrainingActions(data) {
            const training = Array.isArray(data.recommended_training) ? data.recommended_training : [];
            const opening = safeText(data.opening, "");
            const actions = [];

            if (
                opening &&
                opening !== "Unknown Opening" &&
                training.some(item => String(item).toLowerCase().includes("opening"))
            ) {
                actions.push(`<a class="learn-btn study-link" href="opening.html?name=${encodeURIComponent(opening)}">Study Opening</a>`);
            }

            if (training.some(item => String(item).toLowerCase().includes("tactics"))) {
                actions.push(`<a class="learn-btn secondary-btn study-link" href="tactics.html">Train Tactics</a>`);
            }

            return actions.length > 0
                ? `<div class="review-actions">${actions.join("")}</div>`
                : "";
        }

        function renderReview(data, username) {
            const training = Array.isArray(data.recommended_training) ? data.recommended_training : [];
            const playerResult = username
                ? `<div class="overview-card"><h3>Your result</h3><p>${escapeHtml(safeText(data.player_result, "Unknown"))}</p></div>`
                : "";

            document.getElementById("reviewResult").innerHTML = `
                <div class="review-stack">
                    <div class="analysis-summary-grid review-summary-grid">
                        <div class="overview-card">
                            <h3>Players</h3>
                            <p>${escapeHtml(safeText(data.white))} vs ${escapeHtml(safeText(data.black))}</p>
                        </div>
                        <div class="overview-card">
                            <h3>Result</h3>
                            <p>${escapeHtml(safeText(data.result))}</p>
                        </div>
                        <div class="overview-card">
                            <h3>Move count</h3>
                            <p>${escapeHtml(safeText(data.move_count, "0"))}</p>
                        </div>
                        <div class="overview-card">
                            <h3>Phase</h3>
                            <p>${escapeHtml(safeText(data.estimated_phase))}</p>
                        </div>
                        ${playerResult}
                    </div>

                    <div class="card review-detail-card">
                        <h2>Opening</h2>
                        <p><strong>${escapeHtml(safeText(data.opening, "Unknown Opening"))}</strong></p>
                        <p>ECO: ${escapeHtml(safeText(data.eco, "N/A"))}</p>
                        <p>Date: ${escapeHtml(safeText(data.date, "N/A"))}</p>
                    </div>

                    <div class="card review-detail-card">
                        <h2>Coach Summary</h2>
                        <p>${escapeHtml(safeText(data.coach_summary, "No coach summary available."))}</p>
                    </div>

                    <div class="card review-detail-card">
                        <h2>Recommended Training</h2>
                        ${
                            training.length > 0
                                ? `<ul class="review-training-list">${training.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`
                                : `<p>No specific training recommendation yet.</p>`
                        }
                        ${renderTrainingActions(data)}
                    </div>
                </div>
            `;
        }

        async function analyzePgn() {
            const pgn = document.getElementById("pgnInput").value.trim();
            const username = document.getElementById("reviewUsername").value.trim();
            const resultDiv = document.getElementById("reviewResult");
            const button = document.getElementById("analyzePgnButton");

            if (!pgn) {
                resultDiv.innerHTML = `
                    <div class="card">
                        <h2>PGN required</h2>
                        <p>Please paste a PGN before analyzing.</p>
                    </div>
                `;
                return;
            }

            button.disabled = true;
            button.textContent = "Analyzing...";
            resultDiv.innerHTML = `
                <div class="card loading-card">
                    <div class="loader"></div>
                    <h2>Analyzing game...</h2>
                    <p>Reading PGN tags, move count, phase, and training targets.</p>
                </div>
            `;

            try {
                const response = await fetch(`${API_BASE_URL}/analyze_pgn`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ pgn, username })
                });
                const data = await response.json();

                if (!response.ok || data.error) {
                    resultDiv.innerHTML = `
                        <div class="card">
                            <h2>Error</h2>
                            <p>${escapeHtml(data.error || "Could not analyze this PGN.")}</p>
                        </div>
                    `;
                    return;
                }

                renderReview(data, username);
            } catch (error) {
                console.error(error);
                resultDiv.innerHTML = `
                    <div class="card">
                        <h2>Error</h2>
                        <p>Failed to analyze this PGN.</p>
                    </div>
                `;
            } finally {
                button.disabled = false;
                button.textContent = "Analyze Game";
            }
        }

        function setActiveNav() {
            const buttons = document.querySelectorAll(".brand-links button");
            buttons.forEach(button => {
                if (button.textContent.trim().toLowerCase() === "review") {
                    button.classList.add("active-nav");
                }
            });
        }

        setActiveNav();
    </script>
</body>

</html>
